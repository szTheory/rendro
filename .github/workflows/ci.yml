name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Beam
        uses: erlef/setup-beam@v1
        with:
          otp-version: '28'
          elixir-version: '1.19.5'

      - name: Install Dependencies
        run: mix deps.get

      - name: Run CI
        run: mix ci

      - name: Verify Phoenix Example
        run: |
          cd examples/phoenix_example
          mix deps.get
          mix compile

  long-lived-live-proof:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Beam
        uses: erlef/setup-beam@v1
        with:
          otp-version: '28'
          elixir-version: '1.19.5'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Signing Proof Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y poppler-utils
          pdfsig -v
          python3 -m pip install --upgrade pip
          python3 -m pip install 'certomancer[web-api]' pyHanko pyHanko-cli
          certomancer --version
          pyhanko --version

      - name: Install Elixir Dependencies
        run: mix deps.get

      - name: Run Long-Lived Live Proof
        run: mix test --include live_pdf_tools test/rendro/adapters/signing_live_test.exs

  release-proof:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Beam
        uses: erlef/setup-beam@v1
        with:
          otp-version: '28'
          elixir-version: '1.19.5'

      - name: Install Dependencies
        run: mix deps.get

      - name: Verify Release Proof
        run: mix run scripts/release_preflight_proof.exs --current-version-tag --worktree "$RUNNER_TEMP/rendro-release-proof"
