name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Beam
        uses: erlef/setup-beam@v1
        with:
          otp-version: '28'
          elixir-version: '1.19.5'

      - name: Install Dependencies
        run: mix deps.get

      - name: Run CI
        run: mix ci

  example-phoenix:
    runs-on: ubuntu-latest
    # no `needs:` -> graph-disconnected (D-09); no continue-on-error (D-10)
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Beam
        uses: erlef/setup-beam@v1
        with:
          otp-version: '28'
          elixir-version: '1.19.5'

      - name: Run example app tests
        working-directory: examples/phoenix_example
        run: |
          mix deps.get
          mix test

  viewer-evidence-live-proof:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Beam
        uses: erlef/setup-beam@v1
        with:
          otp-version: '28'
          elixir-version: '1.19.5'

      - name: Install pdfium-cli
        run: |
          curl -fsSL -o pdfium-cli "https://github.com/klippa-app/pdfium-cli/releases/download/v0.10.3/pdfium-webassembly-linux-amd64"
          chmod +x pdfium-cli
          sudo mv pdfium-cli /usr/local/bin/pdfium-cli
          pdfium-cli --version

      - name: Install pdfinfo, qpdf, and pdfsig
        run: |
          sudo apt-get update
          sudo apt-get install -y poppler-utils qpdf
          pdfinfo -v
          qpdf --version
          pdfsig -v

      - name: Setup Python for pyhanko
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install pyhanko-cli
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install pyHanko pyHanko-cli
          pyhanko --version

      - name: Install Elixir Dependencies
        run: mix deps.get

      - name: Run Viewer Evidence Live Proof
        run: |
          mix test --include live_pdf_tools \
            test/rendro/adapters/forms_viewer_evidence_live_test.exs \
            test/rendro/adapters/embedded_files_viewer_evidence_live_test.exs \
            test/rendro/adapters/links_viewer_evidence_live_test.exs \
            test/rendro/adapters/protection_viewer_evidence_live_test.exs \
            test/rendro/adapters/signature_widget_viewer_evidence_live_test.exs \
            test/rendro/adapters/signed_artifact_viewer_evidence_live_test.exs \
            test/rendro/adapters/trust_sensitive_viewer_evidence_live_test.exs

  signing-live-proof:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Beam
        uses: erlef/setup-beam@v1
        with:
          otp-version: '28'
          elixir-version: '1.19.5'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Signing Proof Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y poppler-utils
          pdfsig -v
          python3 -m pip install --upgrade pip
          python3 -m pip install pyHanko pyHanko-cli
          pyhanko --version

      - name: Install Elixir Dependencies
        run: mix deps.get

      - name: Run Signing Live Proof
        run: mix test --include live_signing test/rendro/adapters/signing_live_test.exs

  long-lived-live-proof:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Beam
        uses: erlef/setup-beam@v1
        with:
          otp-version: '28'
          elixir-version: '1.19.5'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Signing Proof Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y poppler-utils
          pdfsig -v
          python3 -m pip install --upgrade pip
          python3 -m pip install 'certomancer[web-api]' pyHanko pyHanko-cli
          certomancer --version
          pyhanko --version

      - name: Install Elixir Dependencies
        run: mix deps.get

      - name: Run Long-Lived Live Proof
        run: mix test --include live_pdf_tools test/rendro/adapters/signing_live_test.exs

  release-proof:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Beam
        uses: erlef/setup-beam@v1
        with:
          otp-version: '28'
          elixir-version: '1.19.5'

      - name: Install Dependencies
        run: mix deps.get

      - name: Verify Release Proof
        run: mix run scripts/release_preflight_proof.exs --current-version-tag --worktree "$RUNNER_TEMP/rendro-release-proof"
