name: HexDocs

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: hexdocs-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify-docs-ready:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Beam
        uses: erlef/setup-beam@8251c48667b97e88a0a24ec512f5b72a039fcea7 # v1
        with:
          otp-version: '28'
          elixir-version: '1.19.5'

      - name: Install Dependencies
        run: mix deps.get

      - name: Verify Docs Contract
        run: mix docs.contract

      - name: Verify Livebook Tutorial
        run: mix rendro.livebook.check

      - name: Verify Comparison Evidence
        run: mix rendro.comparison.check

      - name: Build Hex Package
        run: mix hex.build

      - name: Build Docs
        run: mix docs

      - name: Check Public URL Verifier Syntax
        run: bash -n scripts/verify_public_launch_urls.sh

  publish-hexdocs:
    runs-on: ubuntu-latest
    needs: verify-docs-ready
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Beam
        uses: erlef/setup-beam@8251c48667b97e88a0a24ec512f5b72a039fcea7 # v1
        with:
          otp-version: '28'
          elixir-version: '1.19.5'

      - name: Install Dependencies
        run: mix deps.get

      - name: Validate Hex Publish Secret
        env:
          HEX_API_KEY: ${{ secrets.HEX_API_KEY }}
        run: |
          if [ -z "${HEX_API_KEY}" ]; then
            echo "::error::HEX_API_KEY is not configured for this repository."
            exit 1
          fi

      - name: Publish HexDocs
        env:
          HEX_API_KEY: ${{ secrets.HEX_API_KEY }}
        run: mix hex.publish docs --yes

      - name: Verify Public Launch URLs
        run: scripts/verify_public_launch_urls.sh
